version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qigong_db
    restart: always
    environment:
      POSTGRES_USER: qigong_user
      POSTGRES_PASSWORD: qigong_password
      POSTGRES_DB: qigong_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
